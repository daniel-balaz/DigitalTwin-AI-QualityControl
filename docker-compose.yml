version: '3.8'

services:

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
          - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=heslo

  machine-01:
    build:
      context: .
    env_file: .env
    environment:
      - MACHINE_ID=LIS-01
      - HALL=HALL_A
      - optimal_oil_temp=40.0
      - critical_oil_temp=80.0
      - optimal_pressure=150.0
    ports:
      - "8000:8000"

volumes:
  grafana_data: